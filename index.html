    <!-- Styles du spinner -->
    <style>
      @-webkit-keyframes spin {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      @-moz-keyframes spin {
        0% {
          -moz-transform: rotate(0);
        }
        100% {
          -moz-transform: rotate(360deg);
        }
      }
      @keyframes spin {
        0% {
          transform: rotate(0);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* SPINNER */
      #nb-global-spinner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1003;
        background: #000000;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #nb-global-spinner div:first-child {
        display: block;
        position: relative;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        box-shadow: 0 3px 3px 0 rgba(255, 122, 0, 0.8); /* Orange */
        transform: translate3d(0, 0, 0);
        animation: spin 2s linear infinite;
      }

      #nb-global-spinner div:first-child:before,
      #nb-global-spinner div:first-child:after {
        content: '';
        position: absolute;
        border-radius: 50%;
      }

      #nb-global-spinner div:first-child:before {
        top: 5px;
        left: 5px;
        right: 5px;
        bottom: 5px;
        box-shadow: 0 3px 3px 0 rgba(4, 104, 255, 0.8); /* Bleu */
        animation: spin 3s linear infinite;
      }

      #nb-global-spinner div:first-child:after {
        top: 15px;
        left: 15px;
        right: 15px;
        bottom: 15px;
        box-shadow: 0 3px 3px 0 rgba(32, 201, 151, 0.8); /* Vert */
        animation: spin 1.5s linear infinite;
      }
    </style>

  <body>
    <!-- Spinner initial -->

      <div class="blob blob-0"></div>
    </div>

    <div id="app"></div>

    <script>
      ;(function () {
        const spinner = document.getElementById('nb-global-spinner')
        if (!spinner) return

        const shield = document.createElement('style')
        shield.id = 'spinner-shield'
        shield.textContent = `#nb-global-spinner {
          display: flex !important;
          visibility: visible !important;
          opacity: 1 !important;
        }`
        document.head.appendChild(shield)

        setTimeout(() => {
          document.head.removeChild(shield)

          spinner.style.transition = 'opacity 0.5s'
          spinner.style.opacity = '0'

          setTimeout(() => {
            spinner.style.display = 'none'
          }, 500)
        }, 2000)
      })()
    </script>
